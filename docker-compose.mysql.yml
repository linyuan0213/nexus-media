version: "3"
services:
  nas-tools:
    image: linyuan0213/nas-tools:latest
    ports:
      - 3000:3000        # 默认的webui控制端口
    volumes:
      - ./config:/config   # 冒号左边请修改为你想保存配置的路径
      - /你的媒体目录:/你想设置的容器内能见到的目录   # 媒体目录，多个目录需要分别映射进来，需要满足配置文件说明中的要求
    environment:
      - PUID=0    # 想切换为哪个用户来运行程序，该用户的uid
      - PGID=0    # 想切换为哪个用户来运行程序，该用户的gid
      - UMASK=000 # 掩码权限，默认000，可以考虑设置为022
      - NT_PORT=3000 # 不填写 默认3000
      # MySQL 数据库配置
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=nas_tools
      - DB_PASSWORD=nas_tools_password
      - DB_NAME=nas_tools
    restart: always
    hostname: nas-tools
    container_name: nas-tools
    networks:
      - nas-tools-network
    healthcheck:
      test: "wget -qO- http://localhost:3000/healthcheck || exit 1" # 检测方式
      interval: 30s  # 多次检测间隔多久 (default: 30s)
      timeout: 30s # 超时时间 (default: 30s)
      retries: 3 # 尝试次数(default: 3)
      start_period: 40s # 容器启动后多久开始检测  (default: 0s)
    depends_on:
      mysql:
        condition: service_healthy
      ocr:
        condition: service_started
      chrome:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: nas-tools-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=nas_tools
      - MYSQL_USER=nas_tools
      - MYSQL_PASSWORD=nas_tools_password
      - TZ=Asia/Shanghai
    volumes:
      - ./mysql_data:/var/lib/mysql
    ports:
      - 3306:3306
    restart: always
    networks:
      - nas-tools-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  ocr:
    image: linyuan0213/nas-tools-ocr:latest
    container_name: nas-tools-ocr
    ports:
      - 9300:9300
    restart: always
    networks:
      - nas-tools-network

  chrome:
    image: linyuan0213/nas-tools-chrome:latest
    container_name: nas-tools-chrome
    shm_size: 2g # 共享内存大小
    environment:
      - VNC_PASSWORD=password
    volumes:
      - ./data:/var/lib/chromium/user_data
    ports:
      - 9850:9850
      - 6080:6080
    restart: always
    networks:
      - nas-tools-network

networks:
  nas-tools-network:
    driver: bridge
    name: nas-tools-network
